<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2인용 격투게임 ⚔️</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

#game {
    position: relative;
    width: 800px;
    height: 300px;
    margin: 30px auto;
    background: #222;
    border: 3px solid white;
}

.player {
    position: absolute;
    width: 60px;
    height: 100px;
    bottom: 0;
    border-radius: 10px;
}

#p1 { background: red; left: 50px; }
#p2 { background: blue; left: 690px; }

.guard { box-shadow: 0 0 20px cyan; }
.attack { background: yellow !important; }

.health {
    margin-top: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>⚔️ 2인용 격투게임</h1>

<div class="health">
🔴 P1 체력: <span id="hp1">100</span>  
🔵 P2 체력: <span id="hp2">100</span>
</div>

<div id="game">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
</div>

<script>
let p1 = document.getElementById("p1");
let p2 = document.getElementById("p2");

let hp1 = 100;
let hp2 = 100;

let p1x = 50;
let p2x = 690;

let p1y = 0;
let p2y = 0;

let p1Guard = false;
let p2Guard = false;

// 키 입력
document.addEventListener("keydown", (e) => {

    // 🔴 P1 (WASD)
    if (e.key === "d") p1x += 10;
    if (e.key === "a") p1x -= 10;
    if (e.key === "w") p1y += 20;
    if (e.key === "s") p1y -= 20;

    if (e.key === "f") attackP1();
    if (e.key === "g") guardP1(true);

    // 🔵 P2 (방향키)
    if (e.key === "ArrowRight") p2x += 10;
    if (e.key === "ArrowLeft") p2x -= 10;
    if (e.key === "ArrowUp") p2y += 20;
    if (e.key === "ArrowDown") p2y -= 20;

    if (e.key === ",") attackP2();
    if (e.key === ".") guardP2(true);

    update();
});

document.addEventListener("keyup", (e) => {
    if (e.key === "g") guardP1(false);
    if (e.key === ".") guardP2(false);
});

// 🔴 P1 공격
function attackP1() {
    p1.classList.add("attack");

    let dist = Math.abs(p1x - p2x);

    if (dist < 80) {
        if (!p2Guard) hp2 -= 10;
        else hp2 -= 2;
        updateHP();
    }

    setTimeout(() => p1.classList.remove("attack"), 200);
}

// 🔵 P2 공격
function attackP2() {
    p2.classList.add("attack");

    let dist = Math.abs(p1x - p2x);

    if (dist < 80) {
        if (!p1Guard) hp1 -= 10;
        else hp1 -= 2;
        updateHP();
    }

    setTimeout(() => p2.classList.remove("attack"), 200);
}

// 가드
function guardP1(on) {
    p1Guard = on;
    if (on) p1.classList.add("guard");
    else p1.classList.remove("guard");
}

function guardP2(on) {
    p2Guard = on;
    if (on) p2.classList.add("guard");
    else p2.classList.remove("guard");
}

// 위치 업데이트
function update() {
    p1.style.left = p1x + "px";
    p2.style.left = p2x + "px";

    p1.style.bottom = p1y + "px";
    p2.style.bottom = p2y + "px";
}

// 체력
function updateHP() {
    document.getElementById("hp1").innerText = hp1;
    document.getElementById("hp2").innerText = hp2;

    if (hp1 <= 0) {
        alert("🔵 P2 승리!");
        location.reload();
    }
    if (hp2 <= 0) {
        alert("🔴 P1 승리!");
        location.reload();
    }
}
</script>

</body>
</html>
