<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>슬롯머신 PRO 🎰</title>

<style>
body {
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-top: 50px;
    font-size: 40px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

.slot-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px 0;
}

.slot {
    width: 100px;
    height: 100px;
    font-size: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid gold;
    border-radius: 15px;
    background: black;
    box-shadow: 0 0 20px gold;
}

.spin {
    animation: spin 0.1s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

button {
    padding: 15px 40px;
    font-size: 22px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 20px gold;
}

button:hover {
    background: orange;
}

#result {
    margin-top: 20px;
    font-size: 28px;
    height: 40px;
}

.win {
    color: lime;
    text-shadow: 0 0 15px lime;
}

.lose {
    color: red;
}
</style>
</head>

<body>

<h1>🎰 슬롯머신 PRO</h1>

<div class="slot-container">
    <div class="slot" id="slot1">🍒</div>
    <div class="slot" id="slot2">🍋</div>
    <div class="slot" id="slot3">🍇</div>
</div>

<button onclick="spin()">🎯 돌리기</button>

<div id="result"></div>

<script>
const items = ["🍒","🍋","🍇","⭐","💎","7️⃣"];

function randomItem() {
    return items[Math.floor(Math.random() * items.length)];
}

function spin() {
    let resultText = document.getElementById("result");
    resultText.innerText = "";
    resultText.className = "";

    let slots = [
        document.getElementById("slot1"),
        document.getElementById("slot2"),
        document.getElementById("slot3")
    ];

    // 애니메이션 시작
    slots.forEach(s => s.classList.add("spin"));

    let interval = setInterval(() => {
        slots.forEach(s => {
            s.innerText = randomItem();
        });
    }, 100);

    // 하나씩 멈추는 효과
    setTimeout(() => stopSlot(0, slots, interval), 1000);
    setTimeout(() => stopSlot(1, slots, interval), 1500);
    setTimeout(() => stopSlot(2, slots, interval), 2000);
}

function stopSlot(index, slots, interval) {
    slots[index].classList.remove("spin");
    slots[index].innerText = randomItem();

    if (index === 2) {
        clearInterval(interval);
        checkResult();
    }
}

function checkResult() {
    let s1 = slot1.innerText;
    let s2 = slot2.innerText;
    let s3 = slot3.innerText;

    let result = document.getElementById("result");

    if (s1 === s2 && s2 === s3) {
        result.innerText = "🎉 잭팟!!!";
        result.className = "win";
    } else {
        result.innerText = "😢 꽝!";
        result.className = "lose";
    }
}
</script>

</body>
</html>
