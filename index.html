<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>격투게임 PRO ⚔️</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

#game {
    position: relative;
    width: 800px;
    height: 300px;
    margin: 30px auto;
    background: #222;
    border: 3px solid white;
}

/* 플레이어 */
.player {
    position: absolute;
    width: 60px;
    height: 100px;
    bottom: 0;
    border-radius: 10px;
}

/* 위치 고정 */
#p1 { background: red; left: 200px; }
#p2 { background: blue; left: 540px; }

/* 무기 */
.weapon {
    position: absolute;
    width: 20px;
    height: 60px;
    background: silver;
    top: 20px;
    transition: transform 0.2s;
}

/* P1 무기 */
#p1 .weapon {
    right: -20px;
}

/* P2 무기 */
#p2 .weapon {
    left: -20px;
}

/* 공격 모션 */
.attack .weapon {
    transform: rotate(90deg) translateY(-20px);
    background: yellow;
}

/* 가드 모션 */
.guard {
    box-shadow: 0 0 20px cyan;
}

.guard .weapon {
    transform: rotate(-90deg);
    background: cyan;
}

.health {
    margin-top: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>⚔️ 격투게임 PRO</h1>

<div class="health">
🔴 P1 체력: <span id="hp1">100</span>  
🔵 P2 체력: <span id="hp2">100</span>
</div>

<div id="game">
    <div id="p1" class="player">
        <div class="weapon"></div>
    </div>
    <div id="p2" class="player">
        <div class="weapon"></div>
    </div>
</div>

<script>
let p1 = document.getElementById("p1");
let p2 = document.getElementById("p2");

let hp1 = 100;
let hp2 = 100;

let p1Guard = false;
let p2Guard = false;

// 공격 쿨타임
let p1Ready = true;
let p2Ready = true;

// 키 입력
document.addEventListener("keydown", (e) => {

    // 🔴 P1
    if (e.key === "f") attackP1();
    if (e.key === "g") guardP1(true);

    // 🔵 P2
    if (e.key === ",") attackP2();
    if (e.key === ".") guardP2(true);
});

document.addEventListener("keyup", (e) => {
    if (e.key === "g") guardP1(false);
    if (e.key === ".") guardP2(false);
});

// 🔴 P1 공격
function attackP1() {
    if (!p1Ready) return;

    p1Ready = false;
    p1.classList.add("attack");

    if (!p2Guard) {
        hp2 -= 2;
        updateHP();
    }

    setTimeout(() => p1.classList.remove("attack"), 200);

    setTimeout(() => p1Ready = true, 500); // 0.5초 쿨타임
}

// 🔵 P2 공격
function attackP2() {
    if (!p2Ready) return;

    p2Ready = false;
    p2.classList.add("attack");

    if (!p1Guard) {
        hp1 -= 2;
        updateHP();
    }

    setTimeout(() => p2.classList.remove("attack"), 200);

    setTimeout(() => p2Ready = true, 500);
}

// 가드
function guardP1(on) {
    p1Guard = on;
    if (on) p1.classList.add("guard");
    else p1.classList.remove("guard");
}

function guardP2(on) {
    p2Guard = on;
    if (on) p2.classList.add("guard");
    else p2.classList.remove("guard");
}

// 체력
function updateHP() {
    document.getElementById("hp1").innerText = hp1;
    document.getElementById("hp2").innerText = hp2;

    if (hp1 <= 0) {
        alert("🔵 P2 승리!");
        location.reload();
    }
    if (hp2 <= 0) {
        alert("🔴 P1 승리!");
        location.reload();
    }
}
</script>

</body>
</html>
