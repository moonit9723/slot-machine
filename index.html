<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>99 퍼즐 🧩</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
}

h1 {
    margin-top: 20px;
}

.grid {
    width: 500px;
    height: 500px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 3px;
}

.tile {
    background: gold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    border-radius: 5px;
}

.empty {
    background: #222;
    cursor: default;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🧩 99 퍼즐 (10x10)</h1>
<button onclick="shuffle()">🔀 섞기</button>

<div class="grid" id="grid"></div>

<script>
const size = 10;
let tiles = [];

// 초기 생성
function init() {
    tiles = [];
    for (let i = 1; i < size*size; i++) {
        tiles.push(i);
    }
    tiles.push(0); // 빈칸
}

function draw() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    tiles.forEach((num, index) => {
        const div = document.createElement("div");
        div.classList.add("tile");

        if (num === 0) {
            div.classList.add("empty");
        } else {
            div.innerText = num;
            div.onclick = () => move(index);
        }

        grid.appendChild(div);
    });
}

function move(index) {
    const emptyIndex = tiles.indexOf(0);

    const row = Math.floor(index / size);
    const col = index % size;
    const emptyRow = Math.floor(emptyIndex / size);
    const emptyCol = emptyIndex % size;

    const isAdjacent =
        (row === emptyRow && Math.abs(col - emptyCol) === 1) ||
        (col === emptyCol && Math.abs(row - emptyRow) === 1);

    if (isAdjacent) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        draw();
        checkWin();
    }
}

function shuffle() {
    for (let i = 0; i < 2000; i++) {
        let rand = Math.floor(Math.random() * tiles.length);
        move(rand);
    }
}

function checkWin() {
    let correct = true;
    for (let i = 0; i < tiles.length - 1; i++) {
        if (tiles[i] !== i + 1) {
            correct = false;
            break;
        }
    }

    if (correct && tiles[tiles.length - 1] === 0) {
        setTimeout(() => alert("🎉 클리어!"), 100);
    }
}

init();
draw();
</script>

</body>
</html>
