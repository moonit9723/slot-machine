<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>격투 게임 ⚔️</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-top: 20px;
}

#game {
    position: relative;
    width: 800px;
    height: 300px;
    margin: 30px auto;
    background: #222;
    border: 3px solid white;
}

.player {
    position: absolute;
    width: 60px;
    height: 100px;
    bottom: 0;
    border-radius: 10px;
}

#p1 {
    background: red;
    left: 50px;
}

#p2 {
    background: blue;
    right: 50px;
}

.health {
    font-size: 20px;
    margin: 10px;
}

.guard {
    box-shadow: 0 0 20px cyan;
}

.attack {
    background: yellow !important;
}
</style>
</head>

<body>

<h1>⚔️ 격투 게임</h1>

<div class="health">
❤️ 플레이어 체력: <span id="hp1">100</span>  
❤️ 적 체력: <span id="hp2">100</span>
</div>

<div id="game">
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
</div>

<script>
let p1 = document.getElementById("p1");
let p2 = document.getElementById("p2");

let hp1 = 100;
let hp2 = 100;

let p1x = 50;
let p2x = 690;

let guarding = false;

// 키 입력
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") p1x += 10;
    if (e.key === "ArrowLeft") p1x -= 10;

    if (e.key === "a") attack();
    if (e.key === "s") guard(true);

    update();
});

document.addEventListener("keyup", (e) => {
    if (e.key === "s") guard(false);
});

// 공격
function attack() {
    p1.classList.add("attack");

    let distance = Math.abs(p1x - p2x);

    if (distance < 80) {
        if (!p2.classList.contains("guard")) {
            hp2 -= 10;
        } else {
            hp2 -= 2; // 가드 시 데미지 감소
        }
        updateHP();
    }

    setTimeout(() => p1.classList.remove("attack"), 200);
}

// 가드
function guard(on) {
    guarding = on;
    if (on) p1.classList.add("guard");
    else p1.classList.remove("guard");
}

// 적 AI
function enemyAI() {
    // 플레이어 쪽으로 이동
    if (p2x > p1x) p2x -= 5;
    else p2x += 5;

    // 랜덤 공격
    if (Math.random() < 0.02) {
        enemyAttack();
    }

    update();
}

function enemyAttack() {
    p2.classList.add("attack");

    let distance = Math.abs(p1x - p2x);

    if (distance < 80) {
        if (!guarding) {
            hp1 -= 10;
        } else {
            hp1 -= 2;
        }
        updateHP();
    }

    setTimeout(() => p2.classList.remove("attack"), 200);
}

// 업데이트
function update() {
    p1.style.left = p1x + "px";
    p2.style.left = p2x + "px";
}

// 체력 업데이트
function updateHP() {
    document.getElementById("hp1").innerText = hp1;
    document.getElementById("hp2").innerText = hp2;

    if (hp1 <= 0) {
        alert("패배...");
        location.reload();
    }
    if (hp2 <= 0) {
        alert("승리!");
        location.reload();
    }
}

// 게임 루프
setInterval(enemyAI, 50);
</script>

</body>
</html>
