<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>슬롯머신 VIP 🎰</title>

<style>
body {
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    margin-top: 40px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

.slot-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px 0;
}

.slot {
    width: 100px;
    height: 100px;
    font-size: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid gold;
    border-radius: 15px;
    background: black;
    box-shadow: 0 0 20px gold;
}

.spin {
    animation: spin 0.1s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

button {
    padding: 12px 30px;
    font-size: 18px;
    margin: 5px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: orange;
}

#result {
    margin-top: 20px;
    font-size: 26px;
    height: 40px;
}

.win { color: lime; }
.lose { color: red; }

.money {
    font-size: 22px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎰 슬롯머신 VIP</h1>

<div class="money">💰 돈: <span id="money">1000</span></div>

<div>
    베팅: 
    <button onclick="setBet(100)">100</button>
    <button onclick="setBet(200)">200</button>
    <button onclick="setBet(500)">500</button>
</div>

<div class="slot-container">
    <div class="slot" id="slot1">🍒</div>
    <div class="slot" id="slot2">🍋</div>
    <div class="slot" id="slot3">🍇</div>
</div>

<button onclick="spin()">🎯 돌리기</button>

<div id="result"></div>

<script>
// 💰 돈 & 베팅
let money = 1000;
let bet = 100;

// 🎧 효과음
const spinSound = new Audio("https://actions.google.com/sounds/v1/mechanical/wood_plank_flicks.ogg");
const winSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const loseSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

// 🎰 슬롯 아이템
const items = ["🍒","🍋","🍇","🍉","🍎","🍊","⭐","💎","7️⃣"];

function setBet(amount) {
    bet = amount;
}

function randomItem() {
    return items[Math.floor(Math.random() * items.length)];
}

function spin() {
    if (money < bet) {
        alert("돈 부족!");
        return;
    }

    money -= bet;
    updateMoney();

    // 🔊 돌리는 소리
    spinSound.currentTime = 0;
    spinSound.play();

    let resultText = document.getElementById("result");
    resultText.innerText = "";
    resultText.className = "";

    let slots = [slot1, slot2, slot3];

    slots.forEach(s => s.classList.add("spin"));

    let interval = setInterval(() => {
        slots.forEach(s => s.innerText = randomItem());
    }, 100);

    setTimeout(() => stopSlot(0, slots, interval), 1000);
    setTimeout(() => stopSlot(1, slots, interval), 1500);
    setTimeout(() => stopSlot(2, slots, interval), 2000);
}

function stopSlot(index, slots, interval) {
    slots[index].classList.remove("spin");
    slots[index].innerText = randomItem();

    if (index === 2) {
        clearInterval(interval);
        checkResult();
    }
}

function checkResult() {
    let s1 = slot1.innerText;
    let s2 = slot2.innerText;
    let s3 = slot3.innerText;

    let result = document.getElementById("result");

    if (s1 === s2 && s2 === s3) {
        let winAmount = bet * 5;

        // 🎯 7️⃣ 보너스
        if (s1 === "7️⃣") {
            winAmount = bet * 20;
        }

        money += winAmount;

        result.innerText = `🎉 당첨! +${winAmount}`;
        result.className = "win";

        winSound.play(); // 🔊 당첨 소리
    } else {
        result.innerText = "😢 꽝!";
        result.className = "lose";

        loseSound.play(); // 🔊 실패 소리
    }

    updateMoney();
}

function updateMoney() {
    document.getElementById("money").innerText = money;
}
</script>

</body>
</html>
